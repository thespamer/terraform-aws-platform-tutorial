name: Terraform CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action"
        required: true
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_IN_AUTOMATION: "true"
  AWS_REGION: "us-east-1"

jobs:
  quality:
    name: Quality and security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate without backend
        run: ./scripts/validate-all.sh

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: true

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials with OIDC
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        if: github.event_name != 'pull_request'
        working-directory: envs/${{ matrix.environment }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan
        if: github.event_name != 'pull_request'
        working-directory: envs/${{ matrix.environment }}
        run: |
          cp terraform.tfvars.example terraform.tfvars
          terraform plan -var-file=terraform.tfvars -out=${{ matrix.environment }}.tfplan
          terraform show -json ${{ matrix.environment }}.tfplan > ${{ matrix.environment }}.plan.json

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            envs/${{ matrix.environment }}/*.tfplan
            envs/${{ matrix.environment }}/*.plan.json
          if-no-files-found: ignore

  manual-apply:
    name: Manual Terraform apply
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: envs/${{ github.event.inputs.environment }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform apply
        working-directory: envs/${{ github.event.inputs.environment }}
        run: |
          cp terraform.tfvars.example terraform.tfvars
          terraform apply -auto-approve -var-file=terraform.tfvars
